<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视觉问答 + RAG 知识库</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}

        :root {
            --primary:#4f6ef7;
            --primary-light:#eef1ff;
            --secondary:#7c3aed;
            --success:#22c55e;
            --danger:#ef4444;
            --bg:#f0f2f5;
            --card:#fff;
            --text:#1e293b;
            --text2:#64748b;
            --border:#e2e8f0;
        }

        body {
            font-family: -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
            background: var(--bg);
            min-height: 100vh;
            color: var(--text);
        }

        .top-bar {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            padding: 18px 24px;
            color: #fff;
        }
        .top-bar h1 { font-size: 1.4rem; }
        .top-bar p { font-size: .85rem; opacity: .8; margin-top: 2px; }

        .container { max-width: 960px; margin: 0 auto; padding: 20px; }

        /* Main card */
        .main-card {
            background: var(--card);
            border-radius: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,.08);
            overflow: hidden;
        }

        /* Image area */
        .img-area {
            padding: 20px;
            border-bottom: 1px solid var(--border);
        }
        .img-area label { font-weight: 600; font-size: .9rem; color: var(--text2); display: block; margin-bottom: 8px; }
        .img-dropzone {
            border: 2px dashed var(--border);
            border-radius: 10px;
            padding: 24px;
            text-align: center;
            cursor: pointer;
            transition: all .25s;
            position: relative;
        }
        .img-dropzone:hover, .img-dropzone.dragover { border-color: var(--primary); background: var(--primary-light); }
        .img-dropzone.has-img { padding: 8px; }
        .img-icon { font-size: 2rem; color: var(--text2); }
        .img-hint { font-size: .85rem; color: var(--text2); margin-top: 4px; }
        .img-clear {
            position: absolute; top: 8px; right: 8px;
            background: rgba(0,0,0,.5); color: #fff; border: none;
            width: 28px; height: 28px; border-radius: 50%;
            cursor: pointer; font-size: 1rem; line-height: 1;
            display: none;
        }
        .img-dropzone.has-img .img-clear { display: flex; align-items: center; justify-content: center; }
        #imagePreview { max-width: 100%; max-height: 250px; border-radius: 8px; display: none; }
        #fileInput { display: none; }

        /* Question area */
        .q-area {
            padding: 20px;
            border-bottom: 1px solid var(--border);
        }
        .q-row { display: flex; gap: 10px; }
        #questionInput {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-size: 1rem;
            transition: border-color .25s;
        }
        #questionInput:focus { outline: none; border-color: var(--primary); }

        .btn {
            padding: 12px 24px;
            border: none; border-radius: 10px;
            font-size: 1rem; font-weight: 600;
            cursor: pointer;
            transition: transform .15s, box-shadow .15s;
            white-space: nowrap;
        }
        .btn:disabled { opacity: .5; cursor: not-allowed; transform: none !important; box-shadow: none !important; }
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #fff;
        }
        .btn-primary:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(79,110,247,.35); }
        .btn-sm { padding: 6px 14px; font-size: .85rem; border-radius: 8px; }

        .quick-qs {
            display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px;
        }
        .quick-q {
            padding: 5px 12px; background: var(--primary-light);
            border: 1px solid #dde3ff; border-radius: 16px;
            font-size: .82rem; color: var(--primary); cursor: pointer;
            transition: all .2s;
        }
        .quick-q:hover { background: var(--primary); color: #fff; border-color: var(--primary); }

        /* Loading / Error */
        .loading { display: none; padding: 30px; text-align: center; border-bottom: 1px solid var(--border); }
        .loading.show { display: block; }
        .spinner {
            width: 32px; height: 32px;
            border: 4px solid #eee; border-top-color: var(--primary);
            border-radius: 50%; animation: spin .8s linear infinite;
            margin: 0 auto 10px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { font-size: .9rem; color: var(--text2); }
        .error-text { color: var(--danger); }

        /* Answer */
        .answer-area { padding: 20px 20px; display: none; border-bottom: 1px solid var(--border); }
        .answer-area.show { display: block; }
        .answer-hdr { font-weight: 600; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
        .badge-rag {
            display: inline-block; background: var(--success); color: #fff;
            font-size: .72rem; padding: 2px 8px; border-radius: 8px;
        }
        .answer-body {
            background: var(--bg); border-radius: 10px;
            padding: 16px; line-height: 1.8; font-size: .95rem;
            white-space: pre-wrap;
        }

        /* KB Panel */
        .kb-section { padding: 0; }
        .kb-toggle {
            width: 100%; padding: 14px 20px;
            background: none; border: none; border-bottom: 1px solid var(--border);
            font-size: .95rem; font-weight: 600; cursor: pointer;
            display: flex; align-items: center; justify-content: space-between;
            color: var(--text); transition: background .2s;
        }
        .kb-toggle:hover { background: var(--bg); }
        .kb-arrow { transition: transform .25s; display: inline-block; }
        .kb-arrow.open { transform: rotate(180deg); }
        .kb-body { display: none; padding: 20px; }
        .kb-body.open { display: block; }

        .kb-stats { display: flex; gap: 12px; margin-bottom: 16px; }
        .stat-box {
            flex: 1; background: var(--bg); border-radius: 10px;
            padding: 12px; text-align: center;
        }
        .stat-num { font-size: 1.5rem; font-weight: 700; color: var(--primary); }
        .stat-lbl { font-size: .8rem; color: var(--text2); }

        .doc-upload {
            border: 2px dashed var(--border); border-radius: 10px;
            padding: 20px; text-align: center; cursor: pointer;
            transition: all .25s; margin-bottom: 14px;
        }
        .doc-upload:hover { border-color: var(--primary); background: var(--primary-light); }
        .doc-upload.has-file { border-style: solid; border-color: var(--success); background: #f0fff0; }
        .doc-icon { font-size: 1.6rem; }
        #ragFileInput { display: none; }
        .doc-upload-status { margin-top: 4px; font-size: .85rem; color: var(--primary); font-weight: 600; }

        .doc-list-title { font-weight: 600; margin-bottom: 8px; font-size: .9rem; }
        .doc-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px 12px; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 5px;
        }
        .doc-item:hover { background: var(--bg); }
        .doc-name { font-size: .9rem; }
        .doc-chunks { font-size: .8rem; color: var(--text2); }
        .empty-docs { text-align: center; color: #aaa; padding: 16px; font-size: .9rem; }

        footer { text-align: center; color: var(--text2); padding: 20px; font-size: .85rem; }

        @media (max-width: 640px) {
            .container { padding: 12px; }
            .q-row { flex-direction: column; }
            .kb-stats { flex-direction: column; }
        }
    </style>
</head>
<body>

<div class="top-bar">
    <h1>🖼️ 视觉问答 + 📚 RAG 知识库</h1>
    <p>可选上传图片 · 自动检索知识库 · AI 智能回答</p>
</div>

<div class="container">
    <div class="main-card">

        <!-- Image (可选) -->
        <div class="img-area">
            <label>📷 图片 <span style="color:#aaa;font-weight:400;">（可选）</span></label>
            <div class="img-dropzone" id="dropzone">
                <div id="placeholder">
                    <div class="img-icon">🖼️</div>
                    <div class="img-hint">点击或拖拽上传图片（可选）</div>
                    <div class="img-hint" style="font-size:.78rem;">JPG / PNG / GIF / WebP · 不传则纯文本 + 知识库回答</div>
                </div>
                <img id="imagePreview" alt="预览">
                <button class="img-clear" id="clearImgBtn" title="移除图片">✕</button>
                <input type="file" id="fileInput" accept="image/*">
            </div>
        </div>

        <!-- Question -->
        <div class="q-area">
            <div class="q-row">
                <input type="text" id="questionInput" placeholder="输入你的问题…">
                <button class="btn btn-primary" id="askBtn">🚀 提问</button>
            </div>
            <div class="quick-qs">
                <span class="quick-q" data-q="这张图片描绘了什么？">描述图片</span>
                <span class="quick-q" data-q="图片中有哪些细节？">图片细节</span>
                <span class="quick-q" data-q="总结知识库的主要内容">📚 总结知识库</span>
                <span class="quick-q" data-q="知识库中有哪些关键信息？">💡 提取关键信息</span>
            </div>
        </div>

        <!-- Loading -->
        <div class="loading" id="loadingArea">
            <div class="spinner"></div>
            <div class="loading-text">
                <span id="loadingText">AI 正在思考…</span>
                <span id="loadingSub" style="display:block;font-size:.8rem;color:#94a3b8;margin-top:4px;"></span>
            </div>
        </div>

        <!-- Answer -->
        <div class="answer-area" id="answerArea">
            <div class="answer-hdr">
                🤖 回答
                <span class="badge-rag" id="ragBadge" style="display:none;">RAG</span>
            </div>
            <div class="answer-body" id="answerBody"></div>
        </div>

        <!-- Error inline -->
        <div style="display:none;padding:12px 20px;background:#fef2f2;color:var(--danger);font-size:.9rem;border-bottom:1px solid #fecaca;" id="errorArea"></div>

        <!-- Knowledge Base -->
        <div class="kb-section">
            <button class="kb-toggle" id="kbToggleBtn">
                <span>📂 知识库管理</span>
                <span class="kb-arrow" id="kbArrow">▼</span>
            </button>
            <div class="kb-body" id="kbBody">
                <div class="kb-stats">
                    <div class="stat-box"><div class="stat-num" id="statDocs">0</div><div class="stat-lbl">文档</div></div>
                    <div class="stat-box"><div class="stat-num" id="statChunks">0</div><div class="stat-lbl">知识块</div></div>
                </div>

                <div class="doc-upload" id="docUploadArea">
                    <div class="doc-icon">📄</div>
                    <div style="font-size:.9rem;">点击上传文档到知识库</div>
                    <div style="font-size:.78rem;color:var(--text2);">PDF · DOCX · XLSX · TXT · MD</div>
                    <div class="doc-upload-status" id="docUploadStatus"></div>
                    <input type="file" id="ragFileInput" accept=".pdf,.docx,.xlsx,.xls,.txt,.md,.csv,.log">
                </div>

                <div class="doc-list-title">📋 已收录文档</div>
                <div id="docsContainer">
                    <div class="empty-docs" id="emptyDocs">暂无文档</div>
                </div>
            </div>
        </div>
    </div>

    <footer>Powered by Qwen-VL + RAG · Flask + FAISS + DashScope</footer>
</div>

<script>
// ========== Image ==========
let selectedImage = null;
const dropzone = document.getElementById('dropzone');
const fileInput = document.getElementById('fileInput');
const preview = document.getElementById('imagePreview');
const ph = document.getElementById('placeholder');

dropzone.addEventListener('click', () => fileInput.click());
dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('dragover'); });
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
dropzone.addEventListener('drop', e => {
    e.preventDefault(); dropzone.classList.remove('dragover');
    if (e.dataTransfer.files[0]?.type.startsWith('image/')) setImage(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', e => { if (e.target.files[0]) setImage(e.target.files[0]); });

document.getElementById('clearImgBtn').addEventListener('click', e => {
    e.stopPropagation();
    clearImage();
});

function setImage(f) {
    selectedImage = f;
    const r = new FileReader();
    r.onload = e => { preview.src = e.target.result; preview.style.display = 'block'; ph.style.display = 'none'; dropzone.classList.add('has-img'); };
    r.readAsDataURL(f);
}
function clearImage() {
    selectedImage = null;
    preview.src = ''; preview.style.display = 'none'; ph.style.display = 'block';
    dropzone.classList.remove('has-img');
    fileInput.value = '';
}

// ========== KB Toggle ==========
document.getElementById('kbToggleBtn').addEventListener('click', () => {
    const body = document.getElementById('kbBody');
    const arrow = document.getElementById('kbArrow');
    body.classList.toggle('open');
    arrow.classList.toggle('open');
});

// ========== KB Upload ==========
const docUploadArea = document.getElementById('docUploadArea');
const ragFileInput = document.getElementById('ragFileInput');
docUploadArea.addEventListener('click', () => ragFileInput.click());
ragFileInput.addEventListener('change', e => {
    if (e.target.files[0]) uploadDoc(e.target.files[0]);
});

async function uploadDoc(f) {
    const status = document.getElementById('docUploadStatus');
    status.textContent = '⏳ 正在上传 ' + f.name + '…';
    docUploadArea.classList.add('has-file');
    const fd = new FormData();
    fd.append('file', f);
    try {
        const res = await fetch('/api/knowledge/upload', { method:'POST', body: fd });
        const data = await res.json();
        if (data.success) {
            status.textContent = '✅ ' + data.filename + ' → ' + data.chunk_count + ' 块';
            loadKB();
        } else {
            status.textContent = '❌ ' + (data.error || '上传失败');
        }
    } catch(e) {
        status.textContent = '❌ 网络错误';
    }
    setTimeout(() => { status.textContent = ''; docUploadArea.classList.remove('has-file'); }, 3000);
    ragFileInput.value = '';
}

async function removeDoc(docId) {
    if (!confirm('删除此文档？')) return;
    try {
        await fetch('/api/knowledge/remove', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({doc_id: docId})
        });
        loadKB();
    } catch(e) {}
}

async function loadKB() {
    try {
        const [sRes, dRes] = await Promise.all([
            fetch('/api/knowledge/stats'),
            fetch('/api/knowledge/docs')
        ]);
        const stats = await sRes.json();
        const docs = await dRes.json();
        document.getElementById('statDocs').textContent = stats.total_documents;
        document.getElementById('statChunks').textContent = stats.total_chunks;

        const container = document.getElementById('docsContainer');
        const empty = document.getElementById('emptyDocs');
        if (docs.length === 0) {
            empty.style.display = 'block';
            container.innerHTML = '';
        } else {
            empty.style.display = 'none';
            container.innerHTML = docs.map(d => `
                <div class="doc-item">
                    <span>
                        <span class="doc-name">📄 ${d.filename}</span>
                        <span class="doc-chunks">（${d.chunk_count} 块）</span>
                    </span>
                    <button class="btn btn-sm" style="background:var(--danger);color:#fff;" onclick="removeDoc('${d.doc_id}')">删除</button>
                </div>
            `).join('');
        }
    } catch(e) {}
}

// ========== Ask ==========
document.getElementById('askBtn').addEventListener('click', ask);
document.getElementById('questionInput').addEventListener('keypress', e => { if (e.key === 'Enter') ask(); });

document.querySelectorAll('.quick-q').forEach(el => {
    el.addEventListener('click', () => {
        document.getElementById('questionInput').value = el.dataset.q;
        document.getElementById('questionInput').focus();
    });
});

async function ask() {
    const q = document.getElementById('questionInput').value.trim();
    if (!q) {
        showError('请输入问题'); return;
    }

    // Show loading
    document.getElementById('loadingArea').classList.add('show');
    document.getElementById('answerArea').classList.remove('show');
    document.getElementById('errorArea').style.display = 'none';
    document.getElementById('askBtn').disabled = true;

    const loadText = document.getElementById('loadingText');
    const loadSub = document.getElementById('loadingSub');
    loadText.textContent = '🤔 AI 正在思考…';

    let subParts = [];
    if (selectedImage) subParts.push('📷 分析图片');
    subParts.push('📚 检索知识库');
    loadSub.textContent = subParts.join(' · ');

    try {
        // Step 1: Search KB (head request)
        loadText.textContent = '🔍 检索知识库…';
        try {
            const sr = await fetch('/ask?' + new URLSearchParams({question: q, search_only: 'true'}));
            const sd = await sr.json();
            if (sd.success && sd.rag_doc_count > 0) {
                loadText.textContent = '📚 已找到 ' + sd.rag_doc_count + ' 条参考，生成回答…';
            } else {
                loadText.textContent = '💭 直接回答…';
            }
        } catch(_) {}

        // Step 2: Get unified answer
        const fd = new FormData();
        fd.append('question', q);
        if (selectedImage) fd.append('image', selectedImage);

        const res = await fetch('/ask', { method:'POST', body: fd });
        const data = await res.json();

        if (data.success) {
            document.getElementById('answerBody').textContent = data.answer;
            document.getElementById('answerArea').classList.add('show');
            const badge = document.getElementById('ragBadge');
            if (data.has_rag_context) {
                badge.textContent = `RAG · ${data.rag_doc_count} 条参考`;
                badge.style.display = 'inline-block';
            } else {
                badge.style.display = 'none';
            }
        } else {
            showError(data.error || 'API 调用失败');
        }
    } catch(e) {
        showError('网络请求失败: ' + e.message);
    } finally {
        document.getElementById('loadingArea').classList.remove('show');
        document.getElementById('askBtn').disabled = false;
    }
}

function showError(msg) {
    const el = document.getElementById('errorArea');
    el.textContent = msg;
    el.style.display = 'block';
    document.getElementById('answerArea').classList.remove('show');
    setTimeout(() => el.style.display = 'none', 5000);
}

// Init
loadKB();
</script>

</body>
</html>
