<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视觉问答系统 (VQA)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }

        header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            margin-bottom: 20px;
        }

        .upload-area {
            border: 3px dashed #ddd;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .upload-area:hover {
            border-color: #667eea;
            background: #f8f9ff;
        }

        .upload-area.dragover {
            border-color: #667eea;
            background: #f0f2ff;
        }

        .upload-area.has-image {
            padding: 10px;
        }

        .upload-icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        .upload-text {
            color: #666;
            font-size: 1.1rem;
        }

        .upload-hint {
            color: #999;
            font-size: 0.9rem;
            margin-top: 8px;
        }

        #fileInput {
            display: none;
        }

        #imagePreview {
            max-width: 100%;
            max-height: 400px;
            border-radius: 8px;
            display: none;
        }

        .question-section {
            margin-top: 25px;
        }

        .question-section label {
            display: block;
            font-weight: 600;
            margin-bottom: 10px;
            color: #333;
            font-size: 1.1rem;
        }

        .input-group {
            display: flex;
            gap: 12px;
        }

        #questionInput {
            flex: 1;
            padding: 14px 18px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        #questionInput:focus {
            outline: none;
            border-color: #667eea;
        }

        #askBtn {
            padding: 14px 32px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        #askBtn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        #askBtn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .answer-section {
            margin-top: 25px;
            display: none;
        }

        .answer-section.show {
            display: block;
        }

        .answer-header {
            font-weight: 600;
            color: #333;
            margin-bottom: 12px;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .answer-content {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            line-height: 1.8;
            color: #444;
            font-size: 1rem;
            white-space: pre-wrap;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 30px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            color: #666;
            font-size: 1rem;
        }

        .error {
            background: #fff0f0;
            color: #d32f2f;
            padding: 15px 20px;
            border-radius: 10px;
            margin-top: 15px;
            display: none;
        }

        .error.show {
            display: block;
        }

        .quick-questions {
            margin-top: 15px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .quick-q {
            padding: 8px 16px;
            background: #f0f2ff;
            border: 1px solid #dde3ff;
            border-radius: 20px;
            font-size: 0.9rem;
            color: #667eea;
            cursor: pointer;
            transition: all 0.2s;
        }

        .quick-q:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        footer {
            text-align: center;
            color: rgba(255,255,255,0.8);
            margin-top: 30px;
            font-size: 0.9rem;
        }

        @media (max-width: 600px) {
            header h1 { font-size: 1.8rem; }
            .input-group { flex-direction: column; }
            .upload-area { padding: 25px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🖼️ 视觉问答系统</h1>
            <p>上传图片，提出问题，AI 帮你解读</p>
        </header>

        <div class="card">
            <div class="upload-area" id="uploadArea">
                <div id="uploadPlaceholder">
                    <div class="upload-icon">📷</div>
                    <div class="upload-text">点击或拖拽上传图片</div>
                    <div class="upload-hint">支持 JPG、PNG、GIF、WebP 格式，最大 16MB</div>
                </div>
                <img id="imagePreview" alt="预览图片">
                <input type="file" id="fileInput" accept="image/*">
            </div>

            <div class="question-section">
                <label>💬 你的问题</label>
                <div class="input-group">
                    <input type="text" id="questionInput" placeholder="例如：这张图片里有什么？" />
                    <button id="askBtn">提问</button>
                </div>
                <div class="quick-questions">
                    <span class="quick-q" data-q="这张图片描绘了什么场景？">描述场景</span>
                    <span class="quick-q" data-q="图片中有哪些人或物体？">识别人物/物体</span>
                    <span class="quick-q" data-q="这张图片的氛围和情绪是怎样的？">分析氛围</span>
                    <span class="quick-q" data-q="图片中有什么特别的细节？">发现细节</span>
                </div>
            </div>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <div class="loading-text">AI 正在分析图片，请稍候...</div>
            </div>

            <div class="error" id="error"></div>

            <div class="answer-section" id="answerSection">
                <div class="answer-header">🤖 AI 回答</div>
                <div class="answer-content" id="answerContent"></div>
            </div>
        </div>

        <footer>
            <p>Powered by Qwen VL · Built with Flask & DashScope</p>
        </footer>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const imagePreview = document.getElementById('imagePreview');
        const uploadPlaceholder = document.getElementById('uploadPlaceholder');
        const questionInput = document.getElementById('questionInput');
        const askBtn = document.getElementById('askBtn');
        const loading = document.getElementById('loading');
        const error = document.getElementById('error');
        const answerSection = document.getElementById('answerSection');
        const answerContent = document.getElementById('answerContent');

        let selectedFile = null;

        // 上传区域点击
        uploadArea.addEventListener('click', () => fileInput.click());

        // 拖拽上传
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0 && files[0].type.startsWith('image/')) {
                handleFile(files[0]);
            }
        });

        // 文件选择
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });

        function handleFile(file) {
            selectedFile = file;
            const reader = new FileReader();
            reader.onload = (e) => {
                imagePreview.src = e.target.result;
                imagePreview.style.display = 'block';
                uploadPlaceholder.style.display = 'none';
                uploadArea.classList.add('has-image');
            };
            reader.readAsDataURL(file);
        }

        // 快捷问题
        document.querySelectorAll('.quick-q').forEach(el => {
            el.addEventListener('click', () => {
                questionInput.value = el.dataset.q;
                questionInput.focus();
            });
        });

        // 提问
        askBtn.addEventListener('click', askQuestion);
        questionInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') askQuestion();
        });

        async function askQuestion() {
            if (!selectedFile) {
                showError('请先上传一张图片');
                return;
            }

            const question = questionInput.value.trim();
            if (!question) {
                showError('请输入你的问题');
                return;
            }

            // 显示加载状态
            loading.classList.add('show');
            error.classList.remove('show');
            answerSection.classList.remove('show');
            askBtn.disabled = true;

            const formData = new FormData();
            formData.append('image', selectedFile);
            formData.append('question', question);

            try {
                const response = await fetch('/ask', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (data.success) {
                    answerContent.textContent = data.answer;
                    answerSection.classList.add('show');
                } else {
                    showError(data.error || '未知错误');
                }
            } catch (err) {
                showError('网络请求失败，请检查服务是否运行正常');
            } finally {
                loading.classList.remove('show');
                askBtn.disabled = false;
            }
        }

        function showError(msg) {
            error.textContent = msg;
            error.classList.add('show');
            setTimeout(() => error.classList.remove('show'), 5000);
        }
    </script>
</body>
</html>
